<html lang="pt">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body, html {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0c68f3 0%, #f1f2f5 100%);
            color: #1e293b;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        /* O CORAÇÃO NEON: Mapa Escuro Deep Blue */
        .world-map-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #000000 0%,#103147 85%, #02b7ffe8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0.78;
        }

        .map-country {
            fill: #626262;
            stroke: #28282948;
            stroke-width: 0.7;
        }

        .map-stage {
            position: relative;
            width: min(90vw, 1531px);
            aspect-ratio: 2 / 1;
            max-height: 72vh;
            transform: translate(-3%, 21%) scale(1.65375);
            transform-origin: center center;
        }

        #mapPoints {
            position: absolute;
            inset: 0;
        }

        /* HUD Structure */
        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: grid;
            grid-template-areas: 
                "header header header"
                "team map planning"
                "footer footer footer";
            grid-template-columns: 326px 1fr 347px; 
            grid-template-rows: auto 1fr auto;
            gap: 0.75rem;
            padding: 1rem;
            box-sizing: border-box;
        }

        .ui-layer > * {
            pointer-events: auto;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.077);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Pontos Neon com Ripple */
        .pulse-point {
            position: absolute;
            width: var(--point-size, 4.656px);
            height: var(--point-size, 4.656px);
            transform: translate(-50%, -50%);
            background: var(--pulse-color, #00f2ff);
            border-radius: 50%;
            box-shadow: var(--pulse-shadow, 0 0 15px #00f2ff), var(--pulse-shadow-soft, 0 0 30px rgba(0, 242, 255, 0.5));
        }

        .pulse-point::before,
        .pulse-point::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: var(--point-size, 4.656px);
            height: var(--point-size, 4.656px);
            border: 1.5px solid var(--pulse-color, #00f2ff);
            border-radius: 50%;
            animation: ripple 2.5s infinite ease-out;
            opacity: 0;
        }

        .pulse-point--highlighted {
            --pulse-color: #f97316;
            --pulse-shadow: 0 0 15px #f97316;
            --pulse-shadow-soft: 0 0 30px rgba(249, 115, 22, 0.5);
        }

        .pulse-point--montagem {
            --pulse-color: #eab308;
            --pulse-shadow: 0 0 15px #eab308;
            --pulse-shadow-soft: 0 0 30px rgba(234, 179, 8, 0.5);
        }

        .pulse-point::after {
            animation-delay: 1.25s;
        }

        @keyframes ripple {
            0% {
                width: var(--point-size, 4.656px);
                height: var(--point-size, 4.656px);
                opacity: 0.8;
            }
            100% {
                width: var(--ripple-max, 36px);
                height: var(--ripple-max, 36px);
                opacity: 0;
            }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .planning-item {
            flex: 1 1 0;
            min-height: 0;
        }

        /* Grid específico para Equipa Presente */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, minmax(0, 1fr));
            column-gap: 0.4rem;
            row-gap: 0.005rem;
        }

        .technical-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-rows: repeat(2, minmax(0, 1fr));
            gap: 0.35rem;
        }

        .technical-ripple-dot {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 8px rgba(249, 115, 22, 0.9);
            flex-shrink: 0;
        }

        .technical-ripple-dot::before,
        .technical-ripple-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border: 1.2px solid rgba(249, 115, 22, 0.95);
            border-radius: 50%;
            animation: ripple 2.5s infinite ease-out;
            opacity: 0;
        }

        .technical-ripple-dot::after {
            animation-delay: 1.25s;
        }

        .planning-ripple-dot {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #eab308;
            box-shadow: 0 0 8px rgba(234, 179, 8, 0.9);
            flex-shrink: 0;
        }

        .planning-ripple-dot::before,
        .planning-ripple-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border: 1.2px solid rgba(234, 179, 8, 0.95);
            border-radius: 50%;
            animation: ripple 2.5s infinite ease-out;
            opacity: 0;
        }

        .planning-ripple-dot::after {
            animation-delay: 1.25s;
        }

        #teamList > div {
            height: 80%;
            align-self: start;
        }
    </style>
</head>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-PT');
            document.getElementById('date').innerText = now.toLocaleDateString('pt-PT', { weekday: 'long', day: '2-digit', month: 'long' });
        }

        function getWeatherEmoji(code) {
            if ([0].includes(code)) return '☀️';
            if ([1, 2].includes(code)) return '🌤️';
            if ([3, 45, 48].includes(code)) return '☁️';
            if ([51, 53, 55, 56, 57, 61, 63, 65, 80, 81, 82].includes(code)) return '🌧️';
            if ([66, 67].includes(code)) return '🌨️';
            if ([71, 73, 75, 77, 85, 86].includes(code)) return '❄️';
            if ([95, 96, 99].includes(code)) return '⛈️';
            return '🌡️';
        }

        function renderWeatherForecast(entries) {
            const weatherForecast = document.getElementById('weatherForecast');
            weatherForecast.innerHTML = entries
                .map(entry => `<span class="flex items-center gap-1"><span>${entry.emoji}</span><span>${entry.day}</span></span>`)
                .join('');
        }

        async function updateWeatherForecast() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=38.7223&longitude=-9.1393&daily=weather_code&timezone=auto&forecast_days=4', { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const times = data?.daily?.time || [];
                const codes = data?.daily?.weather_code || [];

                const forecastEntries = times
                    .map((time, index) => ({ time, code: Number(codes[index]) }))
                    .slice(1, 4)
                    .map(item => ({
                        day: new Date(item.time).toLocaleDateString('pt-PT', { weekday: 'short' }).replace('.', ''),
                        emoji: getWeatherEmoji(item.code)
                    }));

                if (forecastEntries.length) {
                    renderWeatherForecast(forecastEntries);
                }
            } catch {
                renderWeatherForecast([
                    { day: 'Qua', emoji: '☀️' },
                    { day: 'Qui', emoji: '⛅' },
                    { day: 'Sex', emoji: '🌧️' }
                ]);
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
        updateWeatherForecast();
        setInterval(updateWeatherForecast, 1000 * 60 * 30);

            const lines = String(text || '').split(/\r?\n/);

            lines.forEach(rawLine => {
                const line = rawLine.trim();
                if (!line || line.startsWith('#')) return;

                if (line.startsWith('[') && line.endsWith(']')) {
                    const sectionName = line.slice(1, -1).trim().toUpperCase();
                    currentSection = Object.prototype.hasOwnProperty.call(sections, sectionName) ? sectionName : null;
                    return;

                if (!currentSection) return;
                sections[currentSection].push(line);
            });

            return sections;

        const maxPlanningRows = 6;

        function parseCsv(text) {
            const rows = [];
            let row = [];
            let value = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i += 1) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        value += '"';
                        i += 1;
                    } else {
                        inQuotes = !inQuotes;
                    }
                    continue;
                }

                if (char === ',' && !inQuotes) {
                    row.push(value);
                    value = '';
                    continue;
                }

                if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i += 1;
                    row.push(value);
                    value = '';
                    if (row.some(cell => cell.trim() !== '')) {
                        rows.push(row);
                    }
                    row = [];
                    continue;
                }

                value += char;
            }

            if (value !== '' || row.length > 0) {
                row.push(value);
                if (row.some(cell => cell.trim() !== '')) {
                    rows.push(row);
                }
            }

            return rows;
        }

        function getPlanningFillColor(evoValue) {
            if (evoValue >= 85) return 'rgba(34, 197, 94, 0.32)';
            if (evoValue >= 60) return 'rgba(59, 130, 246, 0.32)';
            if (evoValue >= 35) return 'rgba(14, 165, 233, 0.32)';
            return 'rgba(148, 163, 184, 0.32)';
        }

        function parseEvo(value) {
            const normalized = String(value || '')
                .replace('%', '')
                .replace(',', '.')
                .replace(/[^0-9.-]/g, '');
            const parsed = Number.parseFloat(normalized);
            if (Number.isNaN(parsed)) return 0;
            return Math.max(0, Math.min(100, parsed));
        }

        function normalizePost(postValue) {
            const raw = String(postValue || '').trim();
            if (!raw) return '-';
            const digits = raw.match(/\d+/);
            return digits ? digits[0] : raw;
        }

                const evoFillStyle = `background: linear-gradient(90deg, ${fillColor} 0%, ${fillColor} ${evo}%, rgba(255,255,255,0.92) ${evo}%, rgba(255,255,255,0.92) 100%);`;

            `;
                planningList.appendChild(div);
            });

        const mapStage = document.querySelector('.map-stage');
        const mapPoints = document.getElementById('mapPoints');
        const worldMapSvg = document.getElementById('worldMapSvg');
        const mapSvgSelection = d3.select(worldMapSvg);

        function clusterByDistance(points, thresholdPx) {
            const clusters = [];
            points.forEach(point => {
                const nearest = clusters.find(cluster => {
                    const dx = cluster.x - point.x;
                    const dy = cluster.y - point.y;
                    return Math.sqrt(dx * dx + dy * dy) <= thresholdPx;
                });

                if (!nearest) {
                    clusters.push({ x: point.x, y: point.y, countries: [point.name], count: 1 });
                    return;
                }

                const nextCount = nearest.count + 1;
                nearest.x = (nearest.x * nearest.count + point.x) / nextCount;
                nearest.y = (nearest.y * nearest.count + point.y) / nextCount;
                nearest.countries.push(point.name);
                nearest.count = nextCount;
            });
            return clusters;
        }

        function renderGeoMap() {
            if (!worldFeatures) return;

            const width = mapStage.clientWidth;
            const height = mapStage.clientHeight;
            worldMapSvg.setAttribute('viewBox', `0 0 ${width} ${height}`);

            const projection = d3.geoMercator().fitSize([width, height], worldFeatures);
            const path = d3.geoPath(projection);

            mapSvgSelection
                .selectAll('path')
                .data(worldFeatures.features)
                .join('path')
                .attr('class', 'map-country')
                .attr('d', path);

            const projectedPoints = countriesWithCoords
                .map(country => {
                    const projected = projection([country.lon, country.lat]);
                    if (!projected) return null;
                    return { ...country, x: projected[0], y: projected[1] };
                })
                .filter(Boolean);

            const clusters = projectedPoints.map(point => ({
                x: point.x,
                y: point.y,
                countries: [point.name],
                count: 1
            }));
            mapPoints.innerHTML = '';

            clusters.forEach(cluster => {
                const point = document.createElement('div');
                const pointSize = 4.656;
                const rippleMax = 36;
                const isMontagemHighlighted = cluster.countries.some(country => highlightedMontagemCountries.has(normalizeCountryKey(country)));
                const isHighlighted = cluster.countries.some(country => highlightedTechnicalCountries.has(normalizeCountryKey(country)));

                if (isMontagemHighlighted) {
                    point.className = 'pulse-point pulse-point--montagem';
                } else if (isHighlighted) {
                    point.className = 'pulse-point pulse-point--highlighted';
                } else {
                    point.className = 'pulse-point';
                }
                point.style.top = `${(cluster.y / height) * 100}%`;
                point.style.left = `${(cluster.x / width) * 100}%`;
                point.style.setProperty('--point-size', `${pointSize}px`);
                point.style.setProperty('--ripple-max', `${rippleMax}px`);
                point.title = cluster.count > 1
                    ? `${cluster.count} países: ${cluster.countries.join(', ')}`
                    : cluster.countries[0];
                mapPoints.appendChild(point);
            });
        }

        async function initGeoMap() {
            const topoJsonData = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(res => res.json());
            worldFeatures = topojson.feature(topoJsonData, topoJsonData.objects.countries);
            renderGeoMap();
        }

        let resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderGeoMap, 120);
        });

        initGeoMap();
    </script>
