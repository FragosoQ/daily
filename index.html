<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somengil - Light Eco Dashboard with Neon Heart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body, html {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0c68f3 0%, #f1f2f5 100%);
            color: #1e293b;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        /* O CORAÇÃO NEON: Mapa Escuro Deep Blue */
        .world-map-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #000000 0%,#103147 85%, #02b7ffe8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0.78;
        }

        .map-country {
            fill: #626262;
            stroke: #0a8ec7;
            stroke-width: 0.7;
        }

        .map-stage {
            position: relative;
            width: min(90vw, 1531px);
            aspect-ratio: 2 / 1;
            max-height: 72vh;
            transform: translate(-3%, 16%) scale(1.65375);
            transform-origin: center center;
        }

        #mapPoints {
            position: absolute;
            inset: 0;
        }

        /* HUD Structure */
        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: grid;
            grid-template-areas: 
                "header header header"
                "team map planning"
                "footer footer footer";
            grid-template-columns: 320px 1fr 340px; 
            grid-template-rows: auto 1fr auto;
            gap: 0.75rem;
            padding: 1rem;
            box-sizing: border-box;
        }

        .ui-layer > * {
            pointer-events: auto;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.077);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Pontos Neon com Ripple */
        .pulse-point {
            position: absolute;
            width: var(--point-size, 4.656px);
            height: var(--point-size, 4.656px);
            transform: translate(-50%, -50%);
            background: var(--pulse-color, #00f2ff);
            border-radius: 50%;
            box-shadow: var(--pulse-shadow, 0 0 15px #00f2ff), var(--pulse-shadow-soft, 0 0 30px rgba(0, 242, 255, 0.5));
        }

        .pulse-point::before,
        .pulse-point::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: var(--point-size, 4.656px);
            height: var(--point-size, 4.656px);
            border: 1.5px solid var(--pulse-color, #00f2ff);
            border-radius: 50%;
            animation: ripple 2.5s infinite ease-out;
            opacity: 0;
        }

        .pulse-point--highlighted {
            --pulse-color: #f97316;
            --pulse-shadow: 0 0 15px #f97316;
            --pulse-shadow-soft: 0 0 30px rgba(249, 115, 22, 0.5);
        }

        .pulse-point::after {
            animation-delay: 1.25s;
        }

        @keyframes ripple {
            0% {
                width: var(--point-size, 4.656px);
                height: var(--point-size, 4.656px);
                opacity: 0.8;
            }
            100% {
                width: var(--ripple-max, 36px);
                height: var(--ripple-max, 36px);
                opacity: 0;
            }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .planning-item {
            flex: 1 1 0;
            min-height: 0;
        }

        /* Grid específico para Equipa Presente */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, minmax(0, 1fr));
            column-gap: 0.4rem;
            row-gap: 0.005rem;
        }

        .technical-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-template-rows: repeat(2, minmax(0, 1fr));
            gap: 0.35rem;
        }

        .technical-ripple-dot {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #f97316;
            box-shadow: 0 0 8px rgba(249, 115, 22, 0.9);
            flex-shrink: 0;
        }

        .technical-ripple-dot::before,
        .technical-ripple-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border: 1.2px solid rgba(249, 115, 22, 0.95);
            border-radius: 50%;
            animation: ripple 2.5s infinite ease-out;
            opacity: 0;
        }

        .technical-ripple-dot::after {
            animation-delay: 1.25s;
        }

        #teamList > div {
            height: 80%;
            align-self: start;
        }
    </style>
</head>
<body>

    <!-- Background com Mapa Neon -->
    <div class="world-map-bg">
        <div class="map-stage">
            <svg id="worldMapSvg" class="map-svg" aria-label="Mapa do Mundo"></svg>

            <div id="mapPoints"></div>
        </div>
    </div>

    <!-- Interface HUD -->
    <div class="ui-layer">
        
        <!-- HEADER -->
        <header style="grid-area: header; background-image: url('https://static.wixstatic.com/media/a6967f_7bda25c185b24581b7679ed0dedb904e~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;" class="flex justify-between items-center glass-card shrink-0 relative h-20 overflow-hidden">
            <div class="absolute top-0 left-0 p-3">
                 <img src="https://static.wixstatic.com/media/a6967f_982db5e228854134b613cf1ffab4708d~mv2.png" 
                     alt="Somengil Logótipo" 
                     class="w-auto object-contain"
                     style="height: 58.66px;">
            </div>

            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center leading-none">
                <div class="flex items-center gap-2">
                    <img src="https://static.wixstatic.com/media/a6967f_63fc48d3787f4b99b28eb81d9aa33de8~mv2.png" alt="Escudo de segurança" class="w-5 h-5 object-contain" style="filter: brightness(0) invert(1);">
                    <span class="text-2xl font-black text-white">428 Dias</span>
                    <div class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.7)]"></div>
                </div>
                <!--<span class="text-[11px] text-slate-400 uppercase font-bold tracking-tight mt-1">Sem Acidentes</span>-->
            </div>

            <div class="absolute right-8 top-1/2 -translate-y-1/2 flex flex-col items-end gap-1 text-right">
                <div class="text-[9px] text-slate-400 uppercase tracking-widest font-semibold" id="date">...</div>
                <div class="text-sm font-mono font-bold text-white leading-none" id="clock">00:00:00</div>
            </div>
        </header>

        <!-- LEFT: TEAM -->
        <aside style="grid-area: team" class="flex flex-col gap-3 overflow-hidden">
            <div class="glass-card p-4 flex-1" style="background-image: url('https://static.wixstatic.com/media/a6967f_7bda25c185b24581b7679ed0dedb904e~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                <h3 class="text-[11px] font-bold uppercase text-slate-500 tracking-widest border-b border-slate-200 pb-2 mb-2 shrink-0">
                    💪 Equipa Presente
                </h3>
                <div class="flex flex-col gap-3 h-full overflow-hidden">
                    <div class="team-grid overflow-hidden" id="teamList">
                        <!-- Gerado via JavaScript -->
                    </div>

                    <div class="shrink-0">
                        <div class="flex items-center justify-between border-b border-slate-200 pb-2 mb-2">
                            <h4 class="text-[10px] font-bold uppercase text-slate-500 tracking-wider flex items-center gap-1">
                                <span aria-hidden="true">✈️</span>
                                <span>Equipa Técnica</span>
                                <span class="technical-ripple-dot" aria-hidden="true"></span>
                            </h4>
                            <button id="addTechnicalCardBtn" type="button" class="text-[8px] font-bold uppercase tracking-wider text-white bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded-md transition-colors">
                                Adicionar
                            </button>
                        </div>
                        <div class="technical-grid" id="technicalTeamList">
                            <!-- Gerado via JavaScript -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-4 shrink-0" style="height: 15.75rem; background-image: url('https://static.wixstatic.com/media/a6967f_7bda25c185b24581b7679ed0dedb904e~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                <h3 class="text-[11px] font-bold uppercase text-amber-600 tracking-widest mb-1 shrink-0">
                    🏆 Vitórias Internas
                </h3>
                <div class="grid grid-cols-1 gap-2 mt-1 mb-1 h-full" style="grid-template-rows: 1.5fr 1fr;">
                    <div class="min-h-0 overflow-hidden flex items-center justify-center rounded-md shadow-sm border-0" style="background-image: url('https://static.wixstatic.com/media/a6967f_eb6653c0c9724e4fb7782135446f522b~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                        <img src="https://static.wixstatic.com/media/a6967f_56e368dd141b4651bc9d0c8776a01086~mv2.png" alt="Vitórias Internas" class="w-[105%] h-[105%] object-contain max-w-none max-h-none">
                    </div>
                    <div id="victoriesInternalText" contenteditable="true" class="min-h-0 text-[20px] text-white leading-tight outline-none cursor-text px-1 py-0.5"></div>
                </div>
            </div>
        </aside>

        <!-- RIGHT: PLANNING -->
        <aside style="grid-area: planning" class="flex flex-col gap-3 overflow-hidden">
            <div class="glass-card p-4 flex-1" style="background-image: url('https://static.wixstatic.com/media/a6967f_7bda25c185b24581b7679ed0dedb904e~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                <h3 class="text-[11px] font-bold uppercase text-slate-500 tracking-widest border-b border-slate-200 pb-2 mb-2 shrink-0">
                    ⚙️ Linha de Produção
                </h3>
                <div class="flex flex-col gap-2 h-full justify-between overflow-hidden" id="planningList">
                    <!-- Gerado via JavaScript -->
                </div>
            </div>

            <!-- WELCOME CARD SEM MARGEM À DIREITA E EM BAIXO -->
            <div id="welcomeCard" style="background: radial-gradient(circle at center, rgba(81, 184, 234, 1) 0%, rgba(0, 0, 0, 1) 100%); height: 13.125rem;" class="glass-card p-4 text-white shrink-0 shadow-xl relative overflow-hidden">
                <div class="flex flex-col h-full relative z-10">
                    <div class="flex items-center gap-3 mb-1 relative">
                        <button id="welcomeFlagTrigger" type="button" class="pointer-events-auto w-[2.6rem] h-8 bg-white/20 backdrop-blur rounded p-1 flex items-center justify-center border border-white/30 overflow-hidden" title="Mudar país da visita" aria-expanded="false" aria-controls="welcomeFlagMenu">
                            <img id="welcomeFlagIcon" src="https://flagcdn.com/w40/pt.png" alt="Bandeira selecionada" class="w-full h-full object-cover rounded-sm">
                        </button>
                        <div id="welcomeFlagMenu" class="pointer-events-auto hidden fixed z-[9999] w-40 bg-white/95 text-slate-700 border border-slate-200 rounded-lg shadow-lg p-1 max-h-36 overflow-y-auto"></div>
                        <div>
                            <h4 id="welcomeTitle" class="text-sm font-bold italic">Bem-vindos</h4>
                        </div>
                    </div>
                    <p class="text-[10px] text-blue-50 italic leading-tight max-w-[180px]"></p>
                    <div class="flex-1 min-h-0 mt-1 w-[60%] p-2 rounded-md overflow-hidden flex items-center justify-center" style="background-image: url('https://static.wixstatic.com/media/a6967f_7bda25c185b24581b7679ed0dedb904e~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                        <img id="visitorLogoPreview" src="https://static.wixstatic.com/media/a6967f_739875a204df4c2494675746b9d6e9e2~mv2.png" alt="Logo do cliente" class="max-w-full max-h-full object-contain">
                    </div>
                </div>
                
                <!-- Imagem sem margem à direita e em baixo -->
                <div class="absolute bottom-0 right-0 opacity-90 h-full flex items-end">
                    <img src="https://static.wixstatic.com/media/a6967f_57a8d2b6c06a4b819541a54cab7694f4~mv2.png" 
                         alt="Somengil Ícone" 
                         class="h-24 w-auto object-contain">
                </div>
            </div>
        </aside>

        <!-- FOOTER -->
        <footer style="grid-area: footer; background-image: url('https://static.wixstatic.com/media/a6967f_eb6653c0c9724e4fb7782135446f522b~mv2.png'); background-size: cover; background-position: center; background-repeat: no-repeat;" class="glass-card p-4 border-t border-green-400/60 shrink-0">
            <div class="grid grid-cols-5 gap-4 items-center">
                <div class="flex flex-col border-l-2 border-green-500 pl-3">
                    <span class="text-[9px] text-green-600 uppercase font-bold tracking-tighter leading-none mb-1">Âmbitos 1, 2, 3</span>
                    <span class="text-sm font-bold text-white">Eco-Responsabilidade</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-white uppercase font-bold mb-1 leading-none">Total Emissões</span>
                    <span class="text-sm font-bold text-white">142.5 <span class="text-[9px] font-normal text-white">tCO2e</span></span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="bg-green-50 px-4 py-1.5 rounded-xl border border-green-200 text-center">
                        <span class="text-[9px] text-green-700 uppercase block font-bold leading-none">Pegada Líquida</span>
                        <span class="text-xl font-black text-green-600 leading-none">108.3</span>
                    </div>
                </div>
                <div class="flex flex-col text-right">
                    <span class="text-[9px] text-white uppercase font-bold mb-1 leading-none">Crédito Energético</span>
                    <span class="text-sm font-bold text-white">-34.2 MWh</span>
                </div>
                <div class="flex flex-col text-right border-r-2 border-green-500 pr-3">
                    <span class="text-[9px] text-white uppercase font-bold mb-1 leading-none">Pegada / Equip.</span>
                    <span class="text-sm font-bold text-white">0.82 <span class="text-[9px] font-normal text-white">tCO2e</span></span>
                </div>
            </div>
        </footer>

    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pt-PT');
            document.getElementById('date').innerText = now.toLocaleDateString('pt-PT', { weekday: 'long', day: '2-digit', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const STORAGE_KEY = 'daily-dashboard-state-v1';

        function loadDashboardState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch {
                return {};
            }
        }

        const persistedState = loadDashboardState();

        const welcomeFlagCodes = {
            PORTUGAL: 'pt',
            ESPANHA: 'es',
            FRANÇA: 'fr',
            ALEMANHA: 'de',
            BRASIL: 'br',
            USA: 'us'
        };

        const welcomeTranslations = {
            PORTUGAL: 'Bem-vindos',
            ESPANHA: 'Bienvenidos',
            FRANÇA: 'Bienvenue',
            ALEMANHA: 'Willkommen',
            BRASIL: 'Bem-vindos',
            USA: 'Welcome'
        };

        const welcomeCountries = ['PORTUGAL', 'ESPANHA', 'FRANÇA', 'ALEMANHA', 'BRASIL', 'USA'];
        const welcomeCountryNames = {
            PORTUGAL: 'Portugal',
            ESPANHA: 'Espanha',
            FRANÇA: 'França',
            ALEMANHA: 'Alemanha',
            BRASIL: 'Brasil',
            USA: 'USA'
        };

        const teamDefaults = [
            { name: 'Carlos Ferreira', role: 'P1' }, { name: 'Ana Martins', role: 'P2' },
            { name: 'Pedro Vale', role: 'P3' }, { name: 'Maria Luz', role: 'Log' },
            { name: 'Jorge Cruz', role: 'P4' }, { name: 'Rita Gomes', role: 'P5' },
            { name: 'Vasco Lima', role: 'P6' }, { name: 'Sofia M.', role: 'P1' },
            { name: 'Luis T.', role: 'P4' }, { name: 'Inês R.', role: 'P2' },
            { name: 'Miguel S.', role: 'P3' }, { name: 'Joana B.', role: 'P5' },
            { name: 'Tiago F.', role: 'P6' }, { name: 'Helena G.', role: 'QC' },
            { name: 'Bruno A.', role: 'P2' }, { name: 'Patrícia N.', role: 'Log' }
        ];

        const maxTechnicalCards = 4;
        const technicalCountries = ['PORTUGAL', 'ESPANHA', 'FRANÇA', 'ALEMANHA', 'BRASIL', 'USA'];

        const appState = {
            welcomeCountry: welcomeCountries.includes(persistedState.welcomeCountry) ? persistedState.welcomeCountry : 'PORTUGAL',
            team: Array.isArray(persistedState.team) && persistedState.team.length === teamDefaults.length
                ? persistedState.team.map((member, index) => ({
                    name: member?.name || teamDefaults[index].name,
                    role: teamDefaults[index].role,
                    active: typeof member?.active === 'boolean' ? member.active : true
                }))
                : teamDefaults.map(member => ({ ...member, active: true })),
            technicalTeam: Array.isArray(persistedState.technicalTeam)
                ? persistedState.technicalTeam
                    .slice(0, maxTechnicalCards)
                    .map(member => ({
                        name: typeof member?.name === 'string' ? member.name : '',
                        country: technicalCountries.includes(member?.country) ? member.country : technicalCountries[0]
                    }))
                : [],
            victoriesText: typeof persistedState.victoriesText === 'string' ? persistedState.victoriesText : ''
        };

        function saveDashboardState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
            } catch {
            }
        }

        function getWelcomeFlagUrl(country) {
            const code = welcomeFlagCodes[country] || 'un';
            return `https://flagcdn.com/w40/${code}.png`;
        }

        const welcomeFlagIcon = document.getElementById('welcomeFlagIcon');
        const welcomeFlagTrigger = document.getElementById('welcomeFlagTrigger');
        const welcomeFlagMenu = document.getElementById('welcomeFlagMenu');
        const welcomeTitle = document.getElementById('welcomeTitle');
        const victoriesInternalText = document.getElementById('victoriesInternalText');

        document.body.appendChild(welcomeFlagMenu);

        function updateWelcomeCardByCountry(country, shouldPersist = false) {
            welcomeFlagIcon.src = getWelcomeFlagUrl(country);
            welcomeFlagIcon.alt = `Bandeira de ${country}`;
            welcomeFlagTrigger.title = `País da visita: ${country}`;
            welcomeTitle.innerText = welcomeTranslations[country] || 'Welcome';

            if (shouldPersist) {
                appState.welcomeCountry = country;
                saveDashboardState();
            }
        }

        function renderWelcomeFlagMenu() {
            welcomeFlagMenu.innerHTML = welcomeCountries
                .map(country => `
                    <button type="button" data-country="${country}" class="w-full flex items-center gap-2 px-2 py-1 rounded-md hover:bg-slate-100 text-left">
                        <img src="${getWelcomeFlagUrl(country)}" alt="Bandeira de ${country}" class="w-4 h-3 rounded-[2px] object-cover shrink-0" />
                        <span class="text-[10px] font-semibold">${welcomeCountryNames[country]}</span>
                    </button>
                `)
                .join('');
        }

        function setWelcomeFlagMenuOpen(isOpen) {
            if (isOpen) {
                const triggerRect = welcomeFlagTrigger.getBoundingClientRect();
                welcomeFlagMenu.classList.remove('hidden');
                welcomeFlagMenu.style.display = 'block';

                const menuWidth = welcomeFlagMenu.offsetWidth;
                const menuHeight = welcomeFlagMenu.offsetHeight;
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                let left = triggerRect.left;
                let top = triggerRect.bottom + 6;

                if (left + menuWidth > viewportWidth - 8) {
                    left = Math.max(8, viewportWidth - menuWidth - 8);
                }

                if (top + menuHeight > viewportHeight - 8) {
                    top = Math.max(8, triggerRect.top - menuHeight - 6);
                }

                welcomeFlagMenu.style.left = `${left}px`;
                welcomeFlagMenu.style.top = `${top}px`;
            } else {
                welcomeFlagMenu.classList.add('hidden');
                welcomeFlagMenu.style.display = 'none';
            }

            welcomeFlagTrigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }

        renderWelcomeFlagMenu();
        welcomeFlagMenu.style.display = 'none';
        updateWelcomeCardByCountry(appState.welcomeCountry);

        welcomeFlagTrigger.addEventListener('click', (event) => {
            event.stopPropagation();
            const isOpen = welcomeFlagMenu.classList.contains('hidden');
            setWelcomeFlagMenuOpen(isOpen);
        });

        welcomeFlagMenu.addEventListener('click', (event) => {
            const optionButton = event.target.closest('button[data-country]');
            if (!optionButton) return;

            const selectedCountry = optionButton.dataset.country;
            updateWelcomeCardByCountry(selectedCountry, true);
            setWelcomeFlagMenuOpen(false);
        });

        document.addEventListener('click', (event) => {
            if (welcomeFlagMenu.classList.contains('hidden')) return;
            if (welcomeFlagMenu.contains(event.target) || welcomeFlagTrigger.contains(event.target)) return;
            setWelcomeFlagMenuOpen(false);
        });

        window.addEventListener('resize', () => {
            if (!welcomeFlagMenu.classList.contains('hidden')) {
                setWelcomeFlagMenuOpen(true);
            }
        });

        victoriesInternalText.innerText = appState.victoriesText;
        victoriesInternalText.addEventListener('input', () => {
            appState.victoriesText = victoriesInternalText.innerText;
            saveDashboardState();
        });

        const teamList = document.getElementById('teamList');
        appState.team.forEach((member, index) => {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between bg-white/90 p-2 px-3 rounded-lg border border-slate-100 shadow-sm overflow-hidden cursor-pointer';
            div.innerHTML = `
                <div class="flex items-center gap-1.5 overflow-hidden">
                    <div class="status-dot w-1.5 h-1.5 rounded-full shrink-0 ${member.active ? 'bg-green-500' : 'bg-red-500'}"></div>
                    <span class="editable-name text-[12px] font-bold text-slate-700 truncate">${member.name}</span>
                </div>
                <span class="text-[14px] text-blue-600 font-bold bg-blue-50 px-1 py-0.5 rounded-full shrink-0">${member.role}</span>
            `;

            const editableName = div.querySelector('.editable-name');

            div.addEventListener('click', () => {
                if (editableName.isContentEditable) return;
                const statusDot = div.querySelector('.status-dot');
                appState.team[index].active = !appState.team[index].active;
                statusDot.classList.toggle('bg-green-500', appState.team[index].active);
                statusDot.classList.toggle('bg-red-500', !appState.team[index].active);
                saveDashboardState();
            });

        function clusterByDistance(points, thresholdPx) {
            const clusters = [];
            points.forEach(point => {
                const nearest = clusters.find(cluster => {
                    const dx = cluster.x - point.x;
                    const dy = cluster.y - point.y;
                    return Math.sqrt(dx * dx + dy * dy) <= thresholdPx;
                });

                if (!nearest) {
                    clusters.push({ x: point.x, y: point.y, countries: [point.name], count: 1 });
                    return;
                }

                const nextCount = nearest.count + 1;
                nearest.x = (nearest.x * nearest.count + point.x) / nextCount;
                nearest.y = (nearest.y * nearest.count + point.y) / nextCount;
                nearest.countries.push(point.name);
                nearest.count = nextCount;
            });
            return clusters;
        }

        function renderGeoMap() {
            if (!worldFeatures) return;

            const width = mapStage.clientWidth;
            const height = mapStage.clientHeight;
            worldMapSvg.setAttribute('viewBox', `0 0 ${width} ${height}`);

            const projection = d3.geoMercator().fitSize([width, height], worldFeatures);
            const path = d3.geoPath(projection);

            mapSvgSelection
                .selectAll('path')
                .data(worldFeatures.features)
                .join('path')
                .attr('class', 'map-country')
                .attr('d', path);

            const projectedPoints = countriesWithCoords
                .map(country => {
                    const projected = projection([country.lon, country.lat]);
                    if (!projected) return null;
                    return { ...country, x: projected[0], y: projected[1] };
                })
                .filter(Boolean);

            const clusters = projectedPoints.map(point => ({
                x: point.x,
                y: point.y,
                countries: [point.name],
                count: 1
            }));
            mapPoints.innerHTML = '';

            clusters.forEach(cluster => {
                const point = document.createElement('div');
                const pointSize = 4.656;
                const rippleMax = 36;
                const isHighlighted = cluster.countries.some(country => highlightedTechnicalCountries.has(country));

                point.className = isHighlighted ? 'pulse-point pulse-point--highlighted' : 'pulse-point';
                point.style.top = `${(cluster.y / height) * 100}%`;
                point.style.left = `${(cluster.x / width) * 100}%`;
                point.style.setProperty('--point-size', `${pointSize}px`);
                point.style.setProperty('--ripple-max', `${rippleMax}px`);
                point.title = cluster.count > 1
                    ? `${cluster.count} países: ${cluster.countries.join(', ')}`
                    : cluster.countries[0];
                mapPoints.appendChild(point);
            });
        }

        async function initGeoMap() {
            const topoJsonData = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(res => res.json());
            worldFeatures = topojson.feature(topoJsonData, topoJsonData.objects.countries);
            renderGeoMap();
        }

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderGeoMap, 120);
        });
